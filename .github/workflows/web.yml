name: Web — lint, build, e2e

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'fixtures/**'
      - '.github/workflows/web.yml'
  pull_request:
    paths:
      - 'apps/web/**'
      - 'fixtures/**'
  workflow_dispatch:

jobs:
  ci:
    name: lint + build + e2e
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Build runs without secrets — the lazy clients only throw at
          # request time, so the production build succeeds with mock-mode.
          NODE_ENV: production

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e
        env:
          CI: '1'

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7
