name: Wiki build check

on:
  push:
    branches: [main]
    paths:
      - 'wiki/**'
      - '.github/workflows/wiki.yml'
  pull_request:
    paths:
      - 'wiki/**'
  workflow_dispatch:

jobs:
  build:
    name: mkdocs build --strict
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install mkdocs + plugins
        working-directory: wiki
        run: pip install -r requirements.txt

      - name: Build wiki
        # We don't use --strict because Material for MkDocs (open-source
        # edition) prints a non-actionable promo "warning" about MkDocs 2.0
        # which strict mode catches. Instead, capture the build output and
        # fail if real warnings appear (broken links, missing pages, etc.).
        working-directory: wiki
        run: |
          set -o pipefail
          mkdocs build 2>&1 | tee build.log
          # Real warnings we care about
          if grep -E "but there is no such anchor|but the target is not found|does not refer to an existing page|Aborted" build.log; then
            echo "::error::mkdocs build emitted real warnings — see build.log"
            exit 1
          fi
