# Compose project name kept as "snappeal" so the existing Postgres volume
# (snappeal_snappeal_db) stays attached after the brand rename. Cosmetic
# container labels are rebranded; the Postgres role + DB name + volume
# match what's already on disk.
name: snappeal

services:
  db:
    image: postgres:16-alpine
    container_name: parkingrabbit-db
    # Local-only — bind to loopback so the host Next.js dev server can reach
    # it but the port isn't exposed externally.
    ports:
      - "127.0.0.1:5544:5432"
    # NOTE: Postgres role + db name kept as "snappeal" to match the existing
    # volume's role table. Brand rename is intentionally cosmetic here.
    environment:
      POSTGRES_USER: snappeal
      POSTGRES_PASSWORD: snappeal
      POSTGRES_DB: snappeal
    volumes:
      - snappeal_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snappeal -d snappeal"]
      interval: 3s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  wiki:
    build: ./wiki
    container_name: parkingrabbit-wiki
    # Loopback host-port binding so the admin UI's "Wiki" link works in
    # local dev. Central Caddy still reaches it via the caddy_default
    # network using the `parkingrabbit-wiki` container alias.
    ports:
      - "127.0.0.1:8800:8000"
    networks:
      default:
      caddy_default:
        aliases:
          - parkingrabbit-wiki
    volumes:
      - ./wiki/docs:/docs/docs
      - ./wiki/mkdocs.yml:/docs/mkdocs.yml
    command: ["serve", "--dev-addr=0.0.0.0:8000", "--watch-theme"]
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: parkingrabbit-tunnel
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Points at the Next.js dev server running on the host at :3001.
    # (We use 3001 rather than 3000 because theoddstracker-app already
    # binds 127.0.0.1:3000 on the host.)
    command:
      ["tunnel", "--no-autoupdate", "--url", "http://host.docker.internal:3001"]
    networks:
      default:
    restart: unless-stopped
    depends_on:
      - wiki

volumes:
  # Volume name kept as snappeal_db so the existing on-disk volume
  # `snappeal_snappeal_db` (project_volume) stays mounted post-rebrand.
  snappeal_db:

networks:
  default:
  caddy_default:
    external: true
