name: snappeal

services:
  wiki:
    build: ./wiki
    container_name: snappeal-wiki
    # No host port binding — the central Caddy reaches it via the
    # caddy_default network using the `snappeal-wiki` container alias.
    networks:
      default:
      caddy_default:
        aliases:
          - snappeal-wiki
    volumes:
      - ./wiki/docs:/docs/docs
      - ./wiki/mkdocs.yml:/docs/mkdocs.yml
    command: ["serve", "--dev-addr=0.0.0.0:8000", "--watch-theme"]
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: snappeal-tunnel
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Points at the Next.js dev server running on the host at :3001.
    # (We use 3001 rather than 3000 because theoddstracker-app already
    # binds 127.0.0.1:3000 on the host.)
    command:
      ["tunnel", "--no-autoupdate", "--url", "http://host.docker.internal:3001"]
    networks:
      default:
    restart: unless-stopped
    depends_on:
      - wiki

networks:
  default:
  caddy_default:
    external: true
