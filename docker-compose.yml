name: snappeal

services:
  db:
    image: postgres:16-alpine
    container_name: snappeal-db
    # Local-only — bind to loopback so the host Next.js dev server can reach
    # it but the port isn't exposed externally.
    ports:
      - "127.0.0.1:5544:5432"
    environment:
      POSTGRES_USER: snappeal
      POSTGRES_PASSWORD: snappeal
      POSTGRES_DB: snappeal
    volumes:
      - snappeal_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snappeal -d snappeal"]
      interval: 3s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  wiki:
    build: ./wiki
    container_name: snappeal-wiki
    # Loopback host-port binding so the admin UI's "Wiki" link works in
    # local dev. Central Caddy still reaches it via the caddy_default
    # network using the `snappeal-wiki` container alias.
    ports:
      - "127.0.0.1:8800:8000"
    networks:
      default:
      caddy_default:
        aliases:
          - snappeal-wiki
    volumes:
      - ./wiki/docs:/docs/docs
      - ./wiki/mkdocs.yml:/docs/mkdocs.yml
    command: ["serve", "--dev-addr=0.0.0.0:8000", "--watch-theme"]
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: snappeal-tunnel
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Points at the Next.js dev server running on the host at :3001.
    # (We use 3001 rather than 3000 because theoddstracker-app already
    # binds 127.0.0.1:3000 on the host.)
    command:
      ["tunnel", "--no-autoupdate", "--url", "http://host.docker.internal:3001"]
    networks:
      default:
    restart: unless-stopped
    depends_on:
      - wiki

volumes:
  snappeal_db:

networks:
  default:
  caddy_default:
    external: true
