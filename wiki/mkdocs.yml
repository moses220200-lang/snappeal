site_name: ParkingRabbit
site_description: Pay or challenge London parking tickets in minutes.
site_author: ParkingRabbit
copyright: Copyright &copy; 2026 ParkingRabbit

# 2026-05-29 — explicit .html URLs so internal nav doesn't 302-redirect
# when the wiki is served behind a path-prefix proxy (the Next.js
# /wiki/* rewrite + the repo Caddyfile). MkDocs's default
# `use_directory_urls: true` returns 302 → /handoff/ for /handoff,
# without the /wiki prefix the proxy needs, breaking nav links inside
# the iframe. Flipping this off makes MkDocs emit clickable URLs like
# /handoff.html that don't require any redirect to resolve correctly.
use_directory_urls: false

theme:
  name: material
  language: en
  logo: assets/logo.svg
  favicon: assets/logo.svg
  font:
    text: Inter
    code: IBM Plex Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow

extra_css:
  - stylesheets/extra.css

validation:
  nav:
    omitted_files: ignore  # councils/_template.md is intentionally not in nav
  links:
    not_found: warn
    absolute_links: ignore

plugins:
  - search
  - mermaid2
  - glightbox
  - minify:
      minify_html: true
  - git-revision-date-localized:
      enable_creation_date: true
      fallback_to_build_date: true
      enable_git_follow: false  # avoids spurious "first older than last" warnings on renamed/moved files

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

